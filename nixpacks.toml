# Railway / Nixpacks build config for the kirana Telegram bot
[phases.setup]
nixPkgs = ["python312", "gcc", "pkg-config", "zlib", "libffi", "openssl"]
aptPkgs = ["libfreetype6-dev", "libpng-dev", "pkg-config"]

[phases.install]
cmds = ["python -m pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
